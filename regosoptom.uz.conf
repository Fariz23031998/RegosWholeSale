# HTTP — ACME + redirect to HTTPS
# Frontend build (on server): cd frontend && npm ci && \
#   VITE_DEPLOY_TARGET=nginx VITE_API_BASE_URL=https://regosoptom.uz npm run build
# Serves static files from frontend/dist/client (index.html + assets).
server {
    listen 80;
    listen [::]:80;
    server_name regosoptom.uz www.regosoptom.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name regosoptom.uz www.regosoptom.uz;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/regosoptom.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/regosoptom.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /srv/RegosWholeSale/frontend/dist/client;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8005/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /api/ {
        client_max_body_size 50M;
        proxy_pass http://127.0.0.1:8005/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600;
        chunked_transfer_encoding off;
    }

    location / {
        try_files $uri /index.html;
    }
}