# =============================================================================
# Regos Wholesale nginx config — regosoptom.uz (Cloudflare proxy enabled)
# =============================================================================
#
# Architecture
#   - Static React frontend from frontend/dist
#   - FastAPI backend on 127.0.0.1:8000 (uvicorn), proxied at /api/
#   - Webhooks: POST /api/v1/regos/webhook, POST /api/v1/telegram/webhook/{secret}
#
# CLOUDFLARE SETUP
#
#   1. In Cloudflare DNS, point regosoptom.uz and www to your VPS IP with proxy ON
#      (orange cloud).
#
#   2. SSL/TLS → Overview: set mode to "Full (strict)". Origin keeps Let's Encrypt.
#
#   3. Install config files on the server:
#
#        sudo cp cloudflare-real-ip.conf /etc/nginx/cloudflare-real-ip.conf
#        sudo cp regosoptom.uz.conf /etc/nginx/sites-available/regosoptom.uz.conf
#        sudo ln -sf /etc/nginx/sites-available/regosoptom.uz.conf \
#             /etc/nginx/sites-enabled/regosoptom.uz.conf
#
#   4. Optional — load real-IP rules globally instead of per-server:
#
#        sudo cp cloudflare-real-ip.conf /etc/nginx/conf.d/cloudflare-real-ip.conf
#        Then remove the include lines from each server block below.
#
# NEW VPS — obtain SSL certificate (run once):
#
#   Option A — DNS only (grey cloud) during first cert, then enable proxy:
#     1. Set A records to VPS IP with proxy OFF, wait for propagation.
#     2. Follow steps 3–6 below, then turn proxy ON and set SSL to Full (strict).
#
#   Option B — HTTP-01 with proxy ON (works if port 80 reaches nginx):
#     1. Point DNS with proxy ON; ensure origin serves /.well-known/ on port 80.
#     2. Follow bootstrap + certbot steps below.
#
#   3. Prepare directories on the server:
#
#        sudo mkdir -p /var/www/certbot
#        sudo mkdir -p /srv/RegosWholeSale/frontend/dist
#
#   4. FIRST DEPLOY — use the bootstrap config (no SSL files required):
#
#        sudo rm -f /etc/nginx/sites-enabled/default
#        sudo cp regosoptom.uz.conf.bootstrap /etc/nginx/sites-available/regosoptom.uz.conf
#        sudo ln -sf /etc/nginx/sites-available/regosoptom.uz.conf /etc/nginx/sites-enabled/
#        sudo mkdir -p /var/www/certbot/.well-known/acme-challenge
#        sudo chown -R www-data:www-data /var/www/certbot
#        sudo nginx -t && sudo systemctl reload nginx
#
#   5. Request certificate (use your real email):
#
#        sudo certbot certonly --webroot -w /var/www/certbot \
#          -d regosoptom.uz -d www.regosoptom.uz \
#          --email YOUR_EMAIL@example.com --agree-tos --no-eff-email
#
#   6. Switch to full production config:
#
#        sudo cp cloudflare-real-ip.conf /etc/nginx/cloudflare-real-ip.conf
#        sudo cp regosoptom.uz.conf /etc/nginx/sites-available/regosoptom.uz.conf
#        sudo nginx -t && sudo systemctl reload nginx
#
#   7. Verify auto-renewal:
#
#        sudo certbot renew --dry-run
#
# DEPLOY CHECKLIST
#
#   Frontend build (on server or CI, from repo root):
#
#        cd frontend
#        npm ci
#        VITE_API_BASE_URL=https://regosoptom.uz npm run build
#        sudo rsync -av dist/ /srv/RegosWholeSale/frontend/dist/
#
#   Backend (.env on server):
#
#        CORS_ORIGINS=https://regosoptom.uz,https://www.regosoptom.uz
#        TELEGRAM_WEBHOOK_BASE_URL=https://regosoptom.uz
#
#   Backend service (example):
#
#        uvicorn app.main:app --host 127.0.0.1 --port 8000
#
# =============================================================================

# HTTP server — ACME challenge + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name regosoptom.uz www.regosoptom.uz;

    include /etc/nginx/cloudflare-real-ip.conf;

    # Let's Encrypt HTTP-01 challenge (must stay above the HTTPS redirect)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server — use only after certbot certificates exist
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name regosoptom.uz www.regosoptom.uz;

    include /etc/nginx/cloudflare-real-ip.conf;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/regosoptom.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/regosoptom.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /srv/RegosWholeSale/frontend/dist;
    index index.html;

    # Cache static assets aggressively (JS, CSS, fonts, images)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Never cache index.html (so users get updates)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    # Backend health check (FastAPI /health)
    location = /health {
        proxy_pass http://127.0.0.1:8005/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        access_log off;
    }

    # FastAPI API — auth, sales, regos proxy, webhooks, telegram, etc.
    location /api/ {
        client_max_body_size 50M;

        proxy_pass http://127.0.0.1:8005/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600;
        chunked_transfer_encoding off;
    }

    # SPA catch-all (must be last)
    location / {
        try_files $uri /index.html;
    }
}
