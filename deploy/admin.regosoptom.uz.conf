# HTTP — ACME + redirect to HTTPS
# Frontend build (on server, as user app — do NOT use sudo):
#   cd /srv/RegosWholeSale/admin && npm ci && \
#   VITE_API_BASE_URL=https://regosoptom.uz npm run build
server {
    listen 80;
    listen [::]:80;
    server_name admin.regosoptom.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.regosoptom.uz;

    client_max_body_size 10M;

    ssl_certificate /etc/letsencrypt/live/admin.regosoptom.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.regosoptom.uz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /srv/RegosWholeSale/admin/dist;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600;
    }

    location / {
        try_files $uri /index.html;
    }
}
