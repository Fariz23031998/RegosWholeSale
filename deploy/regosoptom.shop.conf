# Tenant frontend — regosoptom.shop (Cloudflare proxied)
# Serves the same build as regosoptom.uz: /srv/RegosWholeSale/frontend/dist/client
#
# Cloudflare:
#   - Point A/AAAA records to this server (proxied / orange cloud)
#   - SSL/TLS mode: Full (strict) after origin cert is installed
#   - Copy deploy/cloudflare-real-ip.conf → /etc/nginx/snippets/cloudflare-real-ip.conf
#
# Frontend build (shared with .uz — rebuild only when app code changes):
#   cd /srv/RegosWholeSale/frontend && npm ci && \
#   VITE_DEPLOY_TARGET=nginx npm run build
# Omit VITE_API_BASE_URL so each domain calls its own /api/ (required for .shop + .uz).
#
# Backend CORS — add to backend/.env:
#   CORS_ORIGINS=...,https://regosoptom.shop,https://www.regosoptom.shop

map $http_x_forwarded_proto $proxy_x_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
}

# HTTP — ACME + redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name regosoptom.shop www.regosoptom.shop;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name regosoptom.shop www.regosoptom.shop;

    include /etc/nginx/snippets/cloudflare-real-ip.conf;

    client_max_body_size 50M;

    ssl_certificate /etc/letsencrypt/live/regosoptom.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/regosoptom.shop/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /srv/RegosWholeSale/frontend/dist/client;
    index index.html;

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri =404;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8005/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        access_log off;
    }

    location /api/ {
        client_max_body_size 50M;
        proxy_pass http://127.0.0.1:8005;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $proxy_x_forwarded_proto;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 3600;
        chunked_transfer_encoding off;
    }

    location / {
        try_files $uri /index.html;
    }
}
